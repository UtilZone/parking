name: Deploy ParkSmart to Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Deploy Cloud Functions
  # ─────────────────────────────────────────────────────────────
  deploy-functions:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install function dependencies
        run: cd functions && npm ci

      - name: Build TypeScript
        run: cd functions && npm run build

      - name: Deploy Functions to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: live
          entryPoint: .
          target: functions
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

  # ─────────────────────────────────────────────────────────────
  # Job 2: Deploy Firestore Rules & Indexes
  # ─────────────────────────────────────────────────────────────
  deploy-firestore:
    name: Deploy Firestore Rules & Indexes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules and indexes
        run: firebase deploy --only firestore --project ${{ secrets.FIREBASE_PROJECT_ID }} --token ${{ secrets.FIREBASE_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # Job 3: Build & Deploy Owner Dashboard
  # ─────────────────────────────────────────────────────────────
  deploy-owner-dashboard:
    name: Deploy Owner Dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/owner-dashboard/package-lock.json

      - name: Install dependencies
        run: cd apps/owner-dashboard && npm ci

      - name: Inject Firebase config
        run: |
          cat > apps/owner-dashboard/src/config/firebase.ts << EOF
          import { initializeApp, getApps } from 'firebase/app';
          import { getAuth }      from 'firebase/auth';
          import { getFirestore } from 'firebase/firestore';
          import { getFunctions } from 'firebase/functions';
          import { getStorage }   from 'firebase/storage';
          const firebaseConfig = {
            apiKey:            "${{ secrets.FIREBASE_API_KEY }}",
            authDomain:        "${{ secrets.FIREBASE_PROJECT_ID }}.firebaseapp.com",
            projectId:         "${{ secrets.FIREBASE_PROJECT_ID }}",
            storageBucket:     "${{ secrets.FIREBASE_PROJECT_ID }}.appspot.com",
            messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
            appId:             "${{ secrets.FIREBASE_APP_ID_WEB }}",
          };
          const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
          export const auth      = getAuth(app);
          export const firestore = getFirestore(app);
          export const functions = getFunctions(app, 'asia-south1');
          export const storage   = getStorage(app);
          export default app;
          EOF

      - name: Build React app
        run: cd apps/owner-dashboard && npm run build

      - name: Deploy to Firebase Hosting (owner-dashboard)
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting:owner-dashboard \
            --project ${{ secrets.FIREBASE_PROJECT_ID }} \
            --token ${{ secrets.FIREBASE_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # Job 4: Build & Deploy Super Admin Panel
  # ─────────────────────────────────────────────────────────────
  deploy-superadmin:
    name: Deploy Super Admin Panel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/superadmin-panel/package-lock.json

      - name: Install dependencies
        run: cd apps/superadmin-panel && npm ci

      - name: Inject Firebase config
        run: |
          cat > apps/superadmin-panel/src/config/firebase.ts << EOF
          import { initializeApp, getApps } from 'firebase/app';
          import { getAuth }      from 'firebase/auth';
          import { getFirestore } from 'firebase/firestore';
          import { getFunctions } from 'firebase/functions';
          const firebaseConfig = {
            apiKey:            "${{ secrets.FIREBASE_API_KEY }}",
            authDomain:        "${{ secrets.FIREBASE_PROJECT_ID }}.firebaseapp.com",
            projectId:         "${{ secrets.FIREBASE_PROJECT_ID }}",
            storageBucket:     "${{ secrets.FIREBASE_PROJECT_ID }}.appspot.com",
            messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
            appId:             "${{ secrets.FIREBASE_APP_ID_WEB }}",
          };
          const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
          export const auth      = getAuth(app);
          export const firestore = getFirestore(app);
          export const functions = getFunctions(app, 'asia-south1');
          export default app;
          EOF

      - name: Build React app
        run: cd apps/superadmin-panel && npm run build

      - name: Deploy to Firebase Hosting (superadmin-panel)
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting:superadmin-panel \
            --project ${{ secrets.FIREBASE_PROJECT_ID }} \
            --token ${{ secrets.FIREBASE_TOKEN }}
